<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komşu Komşu - Hoş Geldiniz</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <style>
        /* Temel Sayfa Ayarları (Uçuk Kaçık Olmayan Renkler) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* Çok açık gri-mavi arka plan */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arka Plandaki Yarı Saydam Yazı Konteyneri */
        .background-text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1; /* En arkada kalması için */
        }

        /* "Komşum Hoş Geldin" Yazısı (Yarı Saydam) */
        .welcome-text {
            font-size: 8vw; /* Ekrana göre büyüyen yazı */
            font-weight: 900;
            color: rgba(52, 152, 219, 0.15); /* Profesyonel mavi, %15 opaklık */
            text-transform: uppercase;
            letter-spacing: 5px;
            user-select: none; /* Yazının seçilmesini engeller */
            text-align: center;
        }

        /* Ön Plandaki Buton Konteyneri */
        .foreground-content {
            position: relative;
            z-index: 2; /* Yazının önünde görünmesi için */
            text-align: center;
        }

        /* "Uygulamayı İndir" Butonu (Opak ve Belirgin) */
        .download-btn {
            background-color: #3498db; /* Canlı ama profesyonel mavi */
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px; /* Tam yuvarlak köşeler */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); /* Hafif gölge */
            transition: all 0.3s ease; /* Hover efekti için geçiş */
            text-decoration: none; /* Link alt çizgisini kaldırır */
            display: inline-block;
        }

        /* Butonun Üzerine Gelince Oluşacak Efekt (Opsiyonel, mobilde az hissedilir) */
        .download-btn:hover {
            background-color: #2980b9; /* Biraz daha koyu mavi */
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            transform: translateY(-2px); /* Hafif yukarı kalkma */
        }

        /* Butona Tıklayınca Oluşacak Efekt */
        .download-btn:active {
            transform: translateY(1px); /* Hafif aşağı basılma */
            box-shadow: 0 2px 10px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>
<body>

    <div class="background-text-container">
        <h1 class="welcome-text">Komşum<br>Hoş Geldin</h1>
    </div>

    <div class="foreground-content">
        <a href="#" class="download-btn">Uygulamayı İndir</a>
    </div>

</body>
</html>
